services:
  mongodb:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=docker
      - DBHost=${DBHost:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - DEMO_PASSWORD=${DEMO_PASSWORD:-1234}
    entrypoint: ["/bin/sh", "/opt/ureport/docker-entrypoint.sh"]
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo_data:
